name: Linux Packages

permissions:
  contents: write

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build-linux-packages:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick rpm
          if command -v magick >/dev/null 2>&1; then
            magick -version
          else
            command -v convert
            convert -version
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build Linux packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run dist:linux:x64

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sorbet-linux-packages
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/latest-linux.yml
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" release/*.AppImage release/*.deb release/*.rpm release/latest-linux.yml --clobber
